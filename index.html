       @media print { .no-print { display: none !important; } body { background: white; } }
       .scrollbar-hide::-webkit-scrollbar { display: none; }

<body class="bg-slate-50 min-h-screen text-slate-900 overflow-x-hidden">

                   <button onclick="switchTab('kelas')" id="btn-kelas" class="menu-btn w-full flex items-center gap-3.5 px-5 py-3.5 rounded-2xl text-slate-500 font-bold transition-all text-left"><i data-lucide="box" class="w-5 h-5"></i> Menu Kelas</button>
                   <button onclick="switchTab('siswa')" id="btn-siswa" class="menu-btn w-full flex items-center gap-3.5 px-5 py-3.5 rounded-2xl text-slate-500 font-bold transition-all text-left"><i data-lucide="users" class="w-5 h-5"></i> Data Siswa</button>
                   <button onclick="switchTab('jadwal')" id="btn-jadwal" class="menu-btn w-full flex items-center gap-3.5 px-5 py-3.5 rounded-2xl text-slate-500 font-bold transition-all text-left"><i data-lucide="calendar" class="w-5 h-5"></i> Jadwal Mengajar</button>
                  
                   <div class="pt-4 pb-2">
                       <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest px-5 mb-2 uppercase text-left">Administrasi</p>
                       <div class="space-y-1 text-left">
                           <button onclick="toggleSubmenu('sub-absen')" class="menu-btn w-full flex items-center justify-between px-5 py-3.5 rounded-2xl text-slate-500 font-bold transition-all text-left"><div class="flex items-center gap-3.5"><i data-lucide="check-circle" class="w-5 h-5"></i> Absensi</div><i data-lucide="chevron-down" class="w-4 h-4"></i></button>

                               <button onclick="switchTab('absen', 'rekap')" id="btn-absen-rekap" class="sub-btn w-full text-left px-4 py-2 text-sm text-slate-500 font-semibold hover:text-blue-600">Rekap & Cetak</button>

                           <div id="sub-nilai" class="hidden pl-10 space-y-1">
                               <button onclick="switchTab('nilai', 'input')" id="btn-nilai-input" class="sub-btn w-full text-left px-4 py-2 text-sm text-slate-500 font-semibold hover:text-blue-600">Input Nilai</button>
                               <button onclick="switchTab('nilai', 'rekap')" id="btn-nilai-rekap" class="sub-btn w-full text-left px-4 py-2 text-sm text-slate-500 font-semibold hover:text-blue-600">Rekap & Cetak</button>
                           </div>
                           
                           <button onclick="toggleSubmenu('sub-jurnal')" class="menu-btn w-full flex items-center justify-between px-5 py-3.5 rounded-2xl text-slate-500 font-bold transition-all text-left"><div class="flex items-center gap-3.5"><i data-lucide="book-open" class="w-5 h-5"></i> Jurnal</div><i data-lucide="chevron-down" class="w-4 h-4"></i></button>
                           <div id="sub-jurnal" class="hidden pl-10 space-y-1">
                               <button onclick="switchTab('jurnal', 'input')" id="btn-jurnal-input" class="sub-btn w-full text-left px-4 py-2 text-sm text-slate-500 font-semibold hover:text-blue-600">Tulis Jurnal</button>
                               <button onclick="switchTab('jurnal', 'rekap')" id="btn-jurnal-rekap" class="sub-btn w-full text-left px-4 py-2 text-sm text-slate-500 font-semibold hover:text-blue-600">Rekap & Cetak</button>
                           </div>
                           
                           <button onclick="toggleSubmenu('sub-bimbingan')" class="menu-btn w-full flex items-center justify-between px-5 py-3.5 rounded-2xl text-slate-500 font-bold transition-all text-left"><div class="flex items-center gap-3.5"><i data-lucide="heart" class="w-5 h-5"></i> Bimbingan</div><i data-lucide="chevron-down" class="w-4 h-4"></i></button>
                           <div id="sub-bimbingan" class="hidden pl-10 space-y-1">
                               <button onclick="switchTab('bimbingan', 'input')" id="btn-bimbingan-input" class="sub-btn w-full text-left px-4 py-2 text-sm text-slate-500 font-semibold hover:text-blue-600">Catat Layanan</button>
                               <button onclick="switchTab('bimbingan', 'rekap')" id="btn-bimbingan-rekap" class="sub-btn w-full text-left px-4 py-2 text-sm text-slate-500 font-semibold hover:text-blue-600">Rekap & Cetak</button>
                           </div>
                       </div>
                   </div>
                  
                   <button onclick="switchTab('pengaturan')" id="btn-pengaturan" class="menu-btn w-full flex items-center gap-3.5 px-5 py-3.5 rounded-2xl text-slate-500 font-bold transition-all text-left"><i data-lucide="settings" class="w-5 h-5"></i> Pengaturan</button>

                   <button id="pwa-install-btn" class="hidden w-full flex items-center justify-center gap-2 px-5 py-3 rounded-2xl bg-blue-50 text-blue-600 font-black uppercase text-xs tracking-widest hover:bg-blue-100 transition-all"><i data-lucide="download-cloud" class="w-4 h-4"></i> Install App</button>

           <!-- Content Area -->

                       <h2 id="tab-title" class="text-xl lg:text-2xl font-black text-slate-800 tracking-tight uppercase">Dashboard</h2>

   <script>
       // --- SYSTEM CONFIG ---
       const GAS_URL = "https://script.google.com/macros/s/AKfycbzvxPQCpRUch0bHgMOm5vWGAtWI-nb_z3iklJq50hXjwUYxreJuET8ZE-I_py_2--AT/exec";
       
       // --- DATA STATE ---
       let db = { Kelas: [], Siswa: [], Nilai: [], Jurnal: [], Absen: [], Bimbingan: [], Settings: [], Jadwal: [] };
       let currentUser = null;
       let isSidebarOpen = true;

       // --- PWA SUPPORT ---
       let deferredPrompt;
       window.addEventListener('beforeinstallprompt', (e) => {
           e.preventDefault();
           deferredPrompt = e;
           document.getElementById('pwa-install-btn').classList.remove('hidden');
       });

       document.getElementById('pwa-install-btn')?.addEventListener('click', async () => {
           if (deferredPrompt) {
               deferredPrompt.prompt();
               const { outcome } = await deferredPrompt.userChoice;
               if (outcome === 'accepted') {
                   console.log('User accepted PWA installation');
               }
               deferredPrompt = null;
               document.getElementById('pwa-install-btn').classList.add('hidden');
           }
       });

       // --- STREAMING_CHUNK: Setting up Unified API Connector... ---
       // --- UNIFIED API CONNECTOR WITH HYBRID FALLBACK ---
       function executeAPI(action, payload, successHandler) {
           startLoading();
           
           // If running outside native Google Apps Script iframe environment (e.g., Blogger or local)
           if (typeof google === 'undefined' || !google.script || !google.script.run) {
               // Fallback to local simulator if no valid GAS_URL is set
               if (GAS_URL === "" || GAS_URL.includes("YOUR_GAS_URL") || window.location.hostname === "localhost" && !GAS_URL) {
                   simulateLocalDatabase(action, payload, (res) => {
                       endLoading();
                       successHandler(res);
                   });
                   return;
               }

               // Execute CORS Post request to Google Apps Script
               fetch(GAS_URL, {
                   method: "POST",
                   mode: "cors",
                   headers: { "Content-Type": "text/plain" },
                   body: JSON.stringify({ action: action, payload: payload })
               })
               .then(res => {
                   if (!res.ok) throw new Error("Network response was not ok");
                   return res.json();
               })
               .then(res => {
                   endLoading();
                   successHandler(res);
               })
               .catch(err => {
                   endLoading();
                   console.error("API Fetch Failure, using Local Mock Database:", err);
                   // Smooth failover: trigger simulated local database
                   simulateLocalDatabase(action, payload, (res) => {
                       Swal.fire({
                           icon: 'warning',
                           title: 'Dialihkan Ke Simulator Lokal',
                           text: 'Koneksi ke backend bermasalah. Menggunakan database demonstrasi offline.',
                           toast: true,
                           position: 'top-end',
                           showConfirmButton: false,
                           timer: 3500
                       });
                       successHandler(res);
                   });
               });
           } else {
               // Execute directly inside Google Apps Script iframe environment
               google.script.run.withSuccessHandler((res) => {
                   endLoading();
                   successHandler(res);
               })[action](payload);
           }
       }

       // --- STREAMING_CHUNK: Initializing Local Mock Database... ---
       // --- LOCAL DEMONSTRATION ENGINE (MOCK DB) ---
       function simulateLocalDatabase(action, payload, successHandler) {
           if (action === "getAllData") {
               successHandler({
                   Kelas: db.Kelas.length ? db.Kelas : [{id: "K-1", nama_kelas: "XII-RPL-1"}, {id: "K-2", nama_kelas: "XII-TKJ-2"}],
                   Siswa: db.Siswa.length ? db.Siswa : [{id: "S-1", nis: "2025001", nama: "Ahmad Dahlan", jk: "L", kelas: "XII-RPL-1", is_bimbingan: "Ya"}],
                   Absen: db.Absen || [],
                   Nilai: db.Nilai || [],
                   Jurnal: db.Jurnal || [],
                   Bimbingan: db.Bimbingan || [],
                   Settings: db.Settings.length ? db.Settings : [{key: 'nama_sekolah', value: 'SMK NEGERI PRESTASI GURU'}, {key: 'alamat', value: 'Jl. Pendidikan No. 45 Jakarta'}],
                   Jadwal: db.Jadwal.length ? db.Jadwal : [{hari: 'Senin', jam: '07:30 - 09:00', kelas: 'XII-RPL-1', mapel: 'Pemrograman Web'}]
               });
           } else if (action === "loginUser") {
               if ((payload.username === 'admin' && payload.password === 'sarjanasoft') || (payload.username === 'admin' && payload.password === 'AdminGuru2025!')) {
                   successHandler({ success: true, user: { username: "admin", nama: "Administrator Pro (Demo)", role: "Admin" } });
               } else {
                   successHandler({ success: false, message: 'Kredensial simulasi tidak valid!' });
               }
           } else if (action === "getData" && payload === "Settings") {
               successHandler(db.Settings.length ? db.Settings : [{key: 'nama_sekolah', value: 'SMK NEGERI PRESTASI GURU'}]);
           } else {
               successHandler({ success: true });
           }
       }

       // --- UI LOADING GRAPHICS ---
       function startLoading() { document.getElementById('loader-bar').style.display = 'block'; }
       function endLoading() { document.getElementById('loader-bar').style.display = 'none'; }
      
       function toggleSidebar() {
           const sidebar = document.getElementById('mobile-sidebar');
           isSidebarOpen = !isSidebarOpen;
           if (isSidebarOpen) sidebar.classList.remove('sidebar-closed');
           else sidebar.classList.add('sidebar-closed');
       }
       
       function toggleSubmenu(id) {
           const el = document.getElementById(id);
           const isHidden = el.classList.contains('hidden');
           document.querySelectorAll('[id^="sub-"]').forEach(s => s.classList.add('hidden'));
           if (isHidden) el.classList.remove('hidden');
       }

       // --- STREAMING_CHUNK: Implementing Authentication Check... ---
       // --- SYSTEM AUTHENTICATION & CORE INIT ---
       window.onload = () => {
           lucide.createIcons();
           checkLogin();
       };

       function getSettingValue(key) { 
           if (!db || !db.Settings || !Array.isArray(db.Settings)) return "";
           const item = db.Settings.find(s => s.key === key); 
           return item ? item.value : ""; 
       }

       function applyBranding() {
           const logo = getSettingValue('logo_url');
           const school = getSettingValue('nama_sekolah');
           if (logo && logo !== "") {
               document.querySelectorAll('#login-logo, #side-logo').forEach(img => {
                   img.src = logo;
                   img.classList.remove('hidden');
               });
               const fallback = document.getElementById('login-icon-fallback');
               if (fallback) fallback.classList.add('hidden');
           }
           if (school && school !== "") {
               const ln = document.getElementById('login-school-name');
               const sn = document.getElementById('side-school-name');
               if (ln) ln.innerText = school;
               if (sn) sn.innerText = school;
           }
       }

       function checkLogin() {
           const auth = localStorage.getItem('guru_v53_ultra');
           if (auth) {
               currentUser = JSON.parse(auth);
               document.getElementById('login-view').classList.add('hidden');
               document.getElementById('main-view').classList.remove('hidden');
               switchTab('dashboard');
           } else {
               document.getElementById('login-view').classList.remove('hidden');
               document.getElementById('main-view').classList.add('hidden');
               
               executeAPI('getData', 'Settings', (settings) => {
                   db.Settings = Array.isArray(settings) ? settings : [];
                   applyBranding();
               });
           }
       }

       function handleLogin(e) {
           e.preventDefault();
           const payload = { 
               username: document.getElementById('username').value, 
               password: document.getElementById('password').value 
           };
           
           executeAPI('loginUser', payload, (res) => {
               if (res && res.success) { 
                   localStorage.setItem('guru_v53_ultra', JSON.stringify(res.user)); 
                   Swal.fire({ 
                       icon: 'success', 
                       title: 'Berhasil Masuk!', 
                       text: `Selamat datang kembali, ${res.user.nama}!`,
                       showConfirmButton: false, 
                       timer: 1500 
                   });
                   checkLogin(); 
               } else {
                   Swal.fire({
                       icon: 'error',
                       title: 'Gagal Masuk',
                       text: (res && res.message) ? res.message : 'Kredensial salah atau koneksi database error!',
                       confirmButtonColor: '#2563eb'
                   });
               }
           });
       }

       function handleLogout() { 
           localStorage.removeItem('guru_v53_ultra'); 
           Swal.fire({ icon: 'info', title: 'Berhasil Keluar', showConfirmButton: false, timer: 1000 });
           checkLogin(); 
       }
       
       // --- NAVIGATION ROUTING ---
       function switchTab(tab, sub = '') {
           document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('sidebar-active'));
           document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('submenu-active'));
           const btn = document.getElementById(`btn-${tab}`);
           if(btn) btn.classList.add('sidebar-active');
           if(sub) {
               const subBtn = document.getElementById(`btn-${tab}-${sub}`);
               if(subBtn) subBtn.classList.add('submenu-active');
               document.getElementById(`sub-${tab}`)?.classList.remove('hidden');
           }
           document.getElementById('tab-title').innerText = sub ? `${tab.toUpperCase()} : ${sub.toUpperCase()}` : tab.toUpperCase();
          
           executeAPI('getAllData', null, (data) => {
               db = data;
               applyBranding();
               renderTab(tab, sub);
               if (window.innerWidth < 1024) toggleSidebar(); 
           });
       }
       
       // --- STREAMING_CHUNK: Implementing Custom Tab Rendering Engine... ---
       // --- DYNAMIC RENDERING ENGINE ---
       function renderTab(tab, sub) {
           const container = document.getElementById('tab-content');
           let html = '';
          
           if (tab === 'dashboard') {
               const now = new Date();
               const today = now.toISOString().split('T')[0];
               const dayNames = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
               const currentDayName = dayNames[now.getDay()];
               const jadwalToday = db.Jadwal.filter(j => j.hari === currentDayName);
               const jurnalToday = db.Jurnal.filter(j => j.tanggal === today);
               const countWali = db.Siswa.filter(s => s.is_bimbingan === "Ya").length;
               html = `
               <div class="space-y-8 animate__animated animate__fadeIn">
                   <!-- Info Stats -->

       function updateMapelOptions() {
           const cls = document.getElementById('nil-kelas').value;
           const selectMapel = document.getElementById('nil-mapel');
           if(!selectMapel) return;
           selectMapel.innerHTML = '<option value="">-- Pilih Mata Pelajaran --</option>';
           let subjects = [];
           if(cls) {
               subjects = [...new Set(db.Jadwal.filter(j => j.kelas === cls).map(j => j.mapel))];
           } else {
               subjects = [...new Set(db.Jadwal.map(j => j.mapel))];
           }
           subjects.forEach(m => {
               selectMapel.innerHTML += `<option value="${m}">${m.toUpperCase()}</option>`;
           });
       }

       function loadAbsenTable() {
           const cls = document.getElementById('abs-kelas').value;
           const area = document.getElementById('abs-table-area');
           const students = db.Siswa.filter(s => s.kelas === cls);
           if(students.length === 0) { area.innerHTML = `<p class="text-center py-10 font-bold text-slate-300 italic uppercase animate__animated animate__fadeIn">-- Tiada data murid --</p>`; return; }
           area.innerHTML = `<div class="overflow-x-auto pt-4 animate__animated animate__fadeIn"><table class="w-full text-sm text-left"><thead class="text-[9px] font-black uppercase text-slate-400 border-b"><tr><th class="px-2 py-4">Nama Murid</th><th class="px-2 py-4 text-center">H</th><th class="px-2 py-4 text-center">S</th><th class="px-2 py-4 text-center">I</th><th class="px-2 py-4 text-center">A</th></tr></thead><tbody>${students.map(s => `<tr><td class="py-4 font-black text-slate-700">${s.nama}</td><td class="py-4 text-center"><input type="radio" name="st-${s.id}" value="H" checked class="w-6 h-6 accent-blue-600"></td><td class="py-4 text-center"><input type="radio" name="st-${s.id}" value="S" class="w-6 h-6 accent-amber-500"></td><td class="py-4 text-center"><input type="radio" name="st-${s.id}" value="I" class="w-6 h-6 accent-emerald-500"></td><td class="py-4 text-center"><input type="radio" name="st-${s.id}" value="A" class="w-6 h-6 accent-rose-500"></td></tr>`).join('')}</tbody></table></div><button onclick="submitAbsen()" class="w-full mt-8 bg-blue-600 text-white py-4 rounded-[2rem] font-black uppercase text-xs tracking-widest shadow-xl text-center active:scale-95 transition-all">Simpan Absensi</button>`;
       }

       function submitAbsen() {
           const cls = document.getElementById('abs-kelas').value;
           const date = document.getElementById('abs-tanggal').value;
           const students = db.Siswa.filter(s => s.kelas === cls);
           const bulanAngka = Number(date.substring(5, 7)).toString();
           const data = students.map(s => ({ tanggal: date, bulan: bulanAngka, siswa_id: s.id, nama_siswa: s.nama, kelas: cls, status: document.querySelector(`input[name="st-${s.id}"]:checked`).value }));
           
           executeAPI('saveBulkAbsen', data, () => {
               Swal.fire({ icon: 'success', title: 'Data Absensi Berhasil Disimpan!', showConfirmButton: false, timer: 1500 });
               switchTab('absen', 'rekap');
           });
       }

       function renderAbsenRekap() {
           const area = document.getElementById('abs-rekap-area');
           if(!area) return;
           const blnSelect = document.getElementById('rek-bulan');
           const clsSelect = document.getElementById('rek-absen-kelas');
           const bln = blnSelect ? blnSelect.value : "";
           const cls = clsSelect ? clsSelect.value : "";
           if(!bln) { area.innerHTML = '<p class="text-center py-10 text-slate-300 font-bold uppercase italic">Pilih periode laporan</p>'; return; }
           let filtered = db.Absen;
           if (bln === 'genap') filtered = filtered.filter(a => [1,2,3,4,5,6].includes(Number(a.bulan)));
           else if (bln === 'ganjil') filtered = filtered.filter(a => [7,8,9,10,11,12].includes(Number(a.bulan)));
           else filtered = filtered.filter(a => String(a.bulan) === String(bln));
           if (cls) filtered = filtered.filter(a => a.kelas === cls);
           if(filtered.length === 0) { area.innerHTML = `<p class="text-center py-20 text-slate-300 font-bold italic uppercase animate__animated animate__fadeIn">Data Tidak Ditemukan</p>`; return; }
           const summary = {};
           filtered.forEach(a => {
               if (!summary[a.siswa_id]) summary[a.siswa_id] = { name: a.nama_siswa, kelas: a.kelas, H: 0, I: 0, S: 0, A: 0, total: 0 };
               summary[a.siswa_id][a.status]++; summary[a.siswa_id].total++;
           });
           area.innerHTML = `<div class="overflow-x-auto"><table class="w-full text-xs text-left border-collapse"><thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-400"><tr><th class="p-4">Nama Murid</th><th class="p-4 text-center">Jml Hari</th><th class="p-4 text-center text-blue-600">H</th><th class="p-4 text-center text-amber-500">S</th><th class="p-4 text-center text-emerald-500">I</th><th class="p-4 text-center text-rose-500">A</th><th class="p-4 text-center font-black">Persen</th></tr></thead><tbody class="divide-y">${Object.values(summary).map(s => `<tr><td class="p-4 font-black text-slate-700">${s.name} <br><span class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">${s.kelas}</span></td><td class="p-4 text-center font-bold text-slate-400">${s.total}</td><td class="p-4 text-center font-bold text-blue-600">${s.H}</td><td class="p-4 text-center font-bold text-amber-500">${s.S}</td><td class="p-4 text-center font-bold text-emerald-500">${s.I}</td><td class="p-4 text-center font-bold text-rose-500">${s.A}</td><td class="p-4 text-center font-black">${Math.round((s.H/s.total)*100)}%</td></tr>`).join('')}</tbody></table></div>`;
       }

       function loadNilaiInputTable() {
           const cls = document.getElementById('nil-kelas').value;
           const mapel = document.getElementById('nil-mapel').value;
           const area = document.getElementById('nilai-input-area');
           if(!cls || !mapel) { Swal.fire('Info', 'Mohon pilih kelas dan mata pelajaran!', 'info'); return; }
           const students = db.Siswa.filter(s => s.kelas === cls);
           area.innerHTML = `<div class="overflow-x-auto pt-4 animate__animated animate__fadeIn"><table class="w-full text-left"><thead class="text-[9px] font-black uppercase text-slate-400 border-b"><tr><th class="px-2 py-4">Nama Murid</th><th class="px-2 py-4 text-right">Skor Nilai</th></tr></thead><tbody>${students.map(s => `<tr><td class="py-4 font-black text-sm text-slate-700 text-left">${s.nama}</td><td class="py-4 text-right"><input type="number" id="inp-nil-${s.id}" class="w-24 p-3 bg-slate-50 border rounded-xl font-bold text-center outline-none focus:ring-2 focus:ring-blue-500" value="0"></td></tr>`).join('')}</tbody></table></div><button onclick="submitBulkNilai()" class="w-full mt-8 bg-blue-600 text-white py-4 rounded-[2rem] font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all text-center">Simpan Entri Nilai Baru</button>`;
       }

       function submitBulkNilai() {
           const cls = document.getElementById('nil-kelas').value;
           const mapel = document.getElementById('nil-mapel').value;
           const jenis = document.getElementById('nil-jenis').value;
           const students = db.Siswa.filter(s => s.kelas === cls);
           const data = students.map(s => ({ siswa_id: s.id, nama_siswa: s.nama, kelas: cls, mapel: mapel, jenis_nilai: jenis, skor: document.getElementById(`inp-nil-${s.id}`).value }));
           
           executeAPI('saveBulkNilai', data, () => {
               Swal.fire({ icon: 'success', title: 'Data Nilai Berhasil Disimpan!', showConfirmButton: false, timer: 1500 });
               switchTab('nilai', 'rekap');
           });
       }

       function renderNilaiRekap() {
           const area = document.getElementById('nilai-rekap-area');
           if(!area) return;
           const cls = document.getElementById('rek-nilai-kelas')?.value || "";
           const mapel = document.getElementById('rek-nilai-mapel')?.value || "";
           if(!cls) { area.innerHTML = '<p class="text-center py-20 font-bold uppercase text-slate-300 italic animate__animated animate__fadeIn">Pilih kelas untuk melihat rekap nilai</p>'; return; }
           if(!db.Nilai || db.Nilai.length === 0) { area.innerHTML = '<p class="text-center py-20 font-bold uppercase text-slate-300 italic">Belum ada data nilai</p>'; return; }
          
           const summary = {};
           let list = db.Nilai.filter(n => n.kelas === cls);
           if (mapel) list = list.filter(n => n.mapel === mapel);
           list.forEach(n => {
               const key = `${n.siswa_id}|${n.mapel}`;
               if (!summary[key]) {
                   summary[key] = {
                       nama: n.nama_siswa, kelas: n.kelas, mapel: n.mapel,
                       PR: [], Harian: [], Tugas: [], Projek: [], Portofolio: [], Sumatif: [], STS: [], SAS: []
                   };
               }
               if (summary[key][n.jenis_nilai]) summary[key][n.jenis_nilai].push(Number(n.skor));
           });
           const getAvg = (arr) => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0;
           area.innerHTML = `<div class="overflow-x-auto animate__animated animate__fadeIn"><table class="w-full text-left text-[10px] border-collapse"><thead class="bg-slate-50 text-slate-400 font-black uppercase"><tr><th class="p-3">Siswa</th><th class="p-3">Mapel</th><th class="p-3 text-center">PR</th><th class="p-3 text-center">HRN</th><th class="p-3 text-center">TGS</th><th class="p-3 text-center">PRJ</th><th class="p-3 text-center">PFT</th><th class="p-3 text-center">SUM</th><th class="p-3 text-center">STS</th><th class="p-3 text-center">SAS</th><th class="p-3 text-center text-blue-600 font-black">AVG</th></tr></thead><tbody class="divide-y">${Object.values(summary).map(s => {
               const averages = [getAvg(s.PR), getAvg(s.Harian), getAvg(s.Tugas), getAvg(s.Projek), getAvg(s.Portofolio), getAvg(s.Sumatif), getAvg(s.STS), getAvg(s.SAS)];
               const finalActive = averages.filter(v => v > 0);
               const finalAvg = finalActive.length ? Math.round(finalActive.reduce((a,b)=>a+b,0)/finalActive.length) : 0;
               return `<tr><td class="p-3 font-black text-slate-800 text-left">${s.nama} <br><span class="text-[8px] font-bold text-slate-300 uppercase">${s.kelas}</span></td><td class="p-3 font-bold uppercase text-slate-400 tracking-tighter">${s.mapel}</td><td class="p-3 text-center font-bold">${getAvg(s.PR)}</td><td class="p-3 text-center font-bold">${getAvg(s.Harian)}</td><td class="p-3 text-center font-bold">${getAvg(s.Tugas)}</td><td class="p-3 text-center font-bold">${getAvg(s.Projek)}</td><td class="p-3 text-center font-bold">${getAvg(s.Portofolio)}</td><td class="p-3 text-center font-bold">${getAvg(s.Sumatif)}</td><td class="p-3 text-center font-bold">${getAvg(s.STS)}</td><td class="p-3 text-center font-bold">${getAvg(s.SAS)}</td><td class="p-3 text-center font-black text-blue-600 bg-slate-50">${finalAvg}</td></tr>`;
           }).join('')}</tbody></table></div>`;
       }

       function renderBimbinganInput() {

               <label class="text-[9px] font-black uppercase text-slate-400 ml-2 block">Pilih Nama Murid</label><select id="bim-siswa" class="form-input-premium">${db.Siswa.filter(s => s.is_bimbingan === "Ya").map(s => `<option value="${s.id}|${s.nama}">${s.nama} (${s.kelas})</option>`).join('')}</select>

       function handleCustomValue(selectId, wrapId) {
           const selectEl = document.getElementById(selectId);
           const wrapEl = document.getElementById(wrapId);
           if (selectEl.value === 'custom') wrapEl.classList.remove('hidden');
           else wrapEl.classList.add('hidden');
       }

       function renderSettingsForm() {
           return `<div class="custom-card p-10 animate__animated animate__fadeIn text-left"><h3 class="font-black text-2xl mb-8 flex items-center gap-3 text-slate-700 uppercase tracking-tighter"><i data-lucide="settings" class="w-8 h-8 text-blue-600"></i> Identitas Sekolah & Cetak</h3>
           <div class="grid grid-cols-1 md:grid-cols-2 gap-10"><div class="space-y-5">
               <div><label class="text-[10px] font-black uppercase text-slate-400 ml-2 tracking-widest block">Nama Instansi</label><input id="set-sekolah" class="form-input-premium uppercase" value="${getSettingValue('nama_sekolah')}"></div>
               <div><label class="text-[10px] font-black uppercase text-slate-400 ml-2 tracking-widest block">Alamat Lengkap</label><input id="set-alamat" class="form-input-premium" value="${getSettingValue('alamat')}"></div>
               <div><label class="text-[10px] font-black uppercase text-slate-400 ml-2 tracking-widest block">URL Logo (Public PNG)</label><input id="set-logo" class="form-input-premium" value="${getSettingValue('logo_url')}"></div>

               <button onclick="updateAppSettings()" class="w-full mt-6 bg-blue-600 text-white py-5 rounded-3xl font-black shadow-xl shadow-blue-100 active:scale-95 transition-all text-center uppercase tracking-widest">Simpan Pengaturan</button></div></div></div>`;

       // --- SYSTEM EVENT HANDLERS ---
       function submitJurnal() {
           const obj = { tanggal: document.getElementById('jur-tgl').value, kelas: document.getElementById('jur-kls').value, materi: document.getElementById('jur-mtr').value, tujuan: document.getElementById('jur-tjn').value, kegiatan: document.getElementById('jur-keg').value, catatan: document.getElementById('jur-ctt').value };
           if(!obj.materi) { Swal.fire('Error', 'Judul materi wajib!', 'warning'); return; }
           handleSave('Jurnal', obj);
       }

       function renderJurnalRekap() {
           const area = document.getElementById('jurnal-rekap-list');
           if(!area) return;
           const cls = document.getElementById('rek-jurnal-kelas')?.value || "";
           let list = db.Jurnal;
           if (cls) list = list.filter(j => j.kelas === cls);
           if(list.length === 0) { area.innerHTML = '<p class="text-center py-20 font-bold uppercase text-slate-300 italic animate__animated animate__fadeIn">Belum ada riwayat jurnal</p>'; return; }
           area.innerHTML = list.map(j => `<div class="p-6 bg-white border border-slate-100 rounded-[2rem] shadow-sm animate__animated animate__fadeIn text-left"><div class="flex justify-between mb-2"><span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">${j.tanggal}</span><span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${j.kelas}</span></div><h5 class="font-black text-slate-800 text-lg uppercase">${j.materi}</h5><div class="mt-2 text-sm text-slate-600 line-clamp-3">${j.kegiatan}</div></div>`).join('');
       }

       function submitBimbingan() {
           const sData = document.getElementById('bim-siswa').value.split('|');
           const rawJns = document.getElementById('bim-jenis').value;
           const obj = { tanggal: new Date().toISOString().split('T')[0], siswa_id: sData[0], nama_siswa: sData[1], jenis: (rawJns === 'custom' ? document.getElementById('bim-custom-val').value : rawJns), hasil: document.getElementById('bim-hasil').value, tindak_lanjut: document.getElementById('bim-tindak').value };
           if(!obj.hasil) { Swal.fire('Error', 'Hasil bimbingan wajib diisi!', 'warning'); return; }
           handleSave('Bimbingan', obj);
       }

       function renderBimbinganRekap() {
           const area = document.getElementById('bimbingan-rekap-list');
           if(!area) return;
           const cls = document.getElementById('rek-bimbingan-kelas')?.value || "";
           let list = db.Bimbingan;
           if (cls) {
               const sIds = db.Siswa.filter(s => s.kelas === cls).map(s => String(s.id));
               list = list.filter(b => sIds.includes(String(b.siswa_id)));
           }
           if(list.length === 0) { area.innerHTML = '<p class="text-center py-20 font-bold text-slate-300 italic uppercase">BELUM ADA LAYANAN BIMBINGAN</p>'; return; }
           area.innerHTML = list.map(b => `<div class="p-8 bg-white border border-slate-100 rounded-[2.5rem] shadow-sm animate__animated animate__fadeIn text-left"><div class="flex justify-between mb-2"><span class="text-[10px] font-black text-blue-600 uppercase">${b.tanggal}</span><span class="text-[10px] font-black text-rose-500 uppercase tracking-widest">${b.jenis}</span></div><h5 class="font-black text-slate-800 text-lg uppercase tracking-tight">${b.nama_siswa}</h5><div class="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-6 text-xs font-bold text-slate-500"><div><p class="text-[9px] uppercase text-slate-300 font-black mb-2">Masalah</p><p class="bg-slate-50 p-4 rounded-2xl">${b.hasil}</p></div><div><p class="text-[9px] uppercase text-slate-300 font-black mb-2">Tindak Lanjut</p><p class="bg-slate-50 p-4 rounded-2xl">${b.tindak_lanjut}</p></div></div></div>`).join('');
       }

       function updateAppSettings() {
           const settingsObj = { nama_sekolah: document.getElementById('set-sekolah').value, alamat: document.getElementById('set-alamat').value, logo_url: document.getElementById('set-logo').value, nama_guru: document.getElementById('set-guru').value, nip_guru: document.getElementById('set-nip-guru').value, nama_kepsek: document.getElementById('set-kepsek').value, nip_kepsek: document.getElementById('set-nip-kepsek').value };
           
           executeAPI('saveSettings', settingsObj, () => {
               Swal.fire('Berhasil', 'Sistem diperbarui!', 'success');
               switchTab('dashboard');
           });
       }

           Swal.fire({ 
               title: 'Tambah Kelas Baru', 
               input: 'text', 
               inputPlaceholder: 'Contoh: XII-TKJ-1',
               confirmButtonText: 'Simpan', 
               customClass: { confirmButton: 'bg-blue-600 p-4 rounded-xl font-bold text-sm px-8' } 
           }).then(r => { 
               if(r.isConfirmed && r.value) {
                   handleSave('Kelas', {nama_kelas: r.value.toUpperCase()});

           Swal.fire({

                   <div><label class="text-[10px] font-black uppercase text-slate-400 ml-2 tracking-widest block">NIS</label><input id="sw-nis" class="form-input-premium mt-1" placeholder="Masukkan NIS..."></div>

                       <div><label class="text-[10px] font-black uppercase text-slate-400 ml-2 tracking-widest block">Kelas</label><select id="sw-kelas" class="form-input-premium mt-1">${db.Kelas.map(k => `<option value="${k.nama_kelas}">${k.nama_kelas}</option>`).join('')}</select></div>

               customClass: { confirmButton: 'bg-blue-600 p-4 rounded-3xl font-black text-xs px-12 shadow-xl' },

       function addJadwalForm() {

                   <select id="sw-jad-hari" class="form-input-premium"><option value="Senin">Senin</option><option value="Selasa">Selasa</option><option value="Rabu">Rabu</option><option value="Kamis">Kamis</option><option value="Jumat">Jumat</option><option value="Sabtu">Sabtu</option></select>

       function handleSave(sheet, obj) {
           executeAPI('saveData', { sheetName: sheet, obj: obj }, () => {
               Swal.fire('Berhasil', 'Data berhasil tersimpan!', 'success');
               switchTab(sheet.toLowerCase());
           });
       }
       
       // --- STREAMING_CHUNK: Managing Print Layout Engine... ---
       // --- MASTER PRINTING ENGINE ---
       function generateMasterPrint(title, tableHtml) {
           const logo = getSettingValue('logo_url') || '';
           const school = getSettingValue('nama_sekolah');
           const address = getSettingValue('alamat');
           const guru = getSettingValue('nama_guru');
           const nipGuru = getSettingValue('nip_guru');
           const kepsek = getSettingValue('nama_kepsek');
           const nipKepsek = getSettingValue('nip_kepsek');
           const win = window.open("", "_blank");
           win.document.write(`<html><head><title>${title}</title><style>body{font-family:sans-serif;padding:40px;color:#333;line-height:1.4}.header{display:flex;align-items:center;border-bottom:3px solid #000;padding-bottom:15px;margin-bottom:20px}.logo{width:80px;height:80px;margin-right:20px;object-fit:contain}.title-area{flex:1}.school-name{font-size:22px;font-weight:900;margin:0;text-transform:uppercase}.school-addr{font-size:12px;margin:0;font-weight:600}h1{text-align:center;font-size:16px;text-transform:uppercase;margin:25px 0}table{width:100%;border-collapse:collapse;margin-top:10px}th,td{border:1px solid #000;padding:10px;font-size:10px;text-align:left}th{background:#f0f0f0;text-transform:uppercase}.footer{margin-top:60px;display:flex;justify-content:space-between;font-size:12px}.sign-box{text-align:center;width:220px}.sign-space{height:80px}</style></head><body><div class="header">${logo ? `<img src="${logo}" class="logo">` : ''}<div class="title-area"><h2 class="school-name">${school}</h2><p class="school-addr">${address}</p></div></div><h1>${title}</h1>${tableHtml}<div class="footer"><div class="sign-box">Mengetahui,<br>Kepala Sekolah<br><div class="sign-space"></div><strong>${kepsek}</strong><br>NIP: ${nipKepsek}</div><div class="sign-box">Dicetak pada ${new Date().toLocaleDateString('id-ID')},<br>Guru Wali / Pengampu<br><div class="sign-space"></div><strong>${guru}</strong><br>NIP: ${nipGuru}</div></div><script>window.print();<\/script></body></html>`);
           win.document.close();
       }

       function printRekapAbsen() { const html = document.getElementById('abs-rekap-area').innerHTML; if(html.includes('Pilih periode')) return Swal.fire('Info', 'Pilih periode!'); generateMasterPrint('REKAPITULASI ABSENSI SISWA', html); }

       function printRekapJurnal() { const cls = document.getElementById('rek-jurnal-kelas')?.value || "SEMUA KELAS"; let list = db.Jurnal; if (cls !== "") list = list.filter(j => j.kelas === cls); let table = `<table><thead><tr><th>TGL</th><th>KLS</th><th>MATERI</th><th>KEGIATAN</th></tr></thead><tbody>${list.map(j => `<tr><td>${j.tanggal}</td><td>${j.kelas}</td><td>${j.materi}</td><td>${j.kegiatan}</td></tr>`).join('')}</tbody></table>`; generateMasterPrint('JURNAL MENGAJAR - ' + (cls||"SEMUA KELAS"), table); }
       function printRekapBimbingan() { const cls = document.getElementById('rek-bimbingan-kelas')?.value || "SEMUA KELAS"; let list = db.Bimbingan; if (cls !== "") { const sIds = db.Siswa.filter(s => s.kelas === cls).map(s => String(s.id)); list = list.filter(b => sIds.includes(String(b.siswa_id))); } let table = `<table><thead><tr><th>TGL</th><th>NAMA SISWA</th><th>KATEGORI</th><th>HASIL</th></tr></thead><tbody>${list.map(b => `<tr><td>${b.tanggal}</td><td>${b.nama_siswa}</td><td>${b.jenis}</td><td>${b.hasil}</td></tr>`).join('')}</tbody></table>`; generateMasterPrint('BIMBINGAN WALI KELAS - ' + (cls||"SEMUA KELAS"), table); }
   </script>
