   <script>
       // --- SYSTEM CONFIG ---
       const GAS_URL = "https://script.google.com/macros/s/AKfycbyzPFbdMaqXUR-VHkeeusHjsYLphR81cWhy-5ZtrVvRvspAWsv1xwoLWMQpd9_WT5g/exec";
       
       // --- DATA STATE & OFFLINE PERSISTENCE INITIALIZER ---
       let db = { Kelas: [], Siswa: [], Nilai: [], Jurnal: [], Absen: [], Bimbingan: [], Settings: [], Jadwal: [] };
       let isOnline = false;
       let currentUser = null;
       let lastErrorLog = "Tidak ada error tercatat.";

       // Load local simulated database on first run
       function loadOfflineDatabase() {
           const localData = localStorage.getItem('teacher_admin_local_db_v53');
           if (localData) {
               db = JSON.parse(localData);
           } else {
               db = {
                   Kelas: [{id: "K-1", nama_kelas: "XII-RPL-1"}, {id: "K-2", nama_kelas: "XII-TKJ-2"}],
                   Siswa: [{id: "S-1", nis: "2025001", nama: "Ahmad Dahlan", jk: "L", kelas: "XII-RPL-1", is_bimbingan: "Ya"}],
                   Absen: [],
                   Nilai: [],
                   Jurnal: [],
                   Bimbingan: [],
                   Settings: [{key: 'nama_sekolah', value: 'SMK NEGERI PRESTASI GURU (DEMO)'}, {key: 'alamat', value: 'Jl. Pendidikan No. 45 Jakarta'}],
                   Jadwal: [{id: "J-1", hari: 'Senin', jam: '07:30 - 09:00', kelas: 'XII-RPL-1', mapel: 'Pemrograman Web'}]
               };
               saveOfflineDatabase();
           }
       }
       
       function saveOfflineDatabase() {
           localStorage.setItem('teacher_admin_local_db_v53', JSON.stringify(db));
       }

       // --- PWA SUPPORT ---
       let deferredPrompt;
       window.addEventListener('beforeinstallprompt', (e) => {
           e.preventDefault();
           deferredPrompt = e;
           document.getElementById('pwa-install-btn').classList.remove('hidden');
       });

       document.getElementById('pwa-install-btn')?.addEventListener('click', async () => {
           if (deferredPrompt) {
               deferredPrompt.prompt();
               const { outcome } = await deferredPrompt.userChoice;
               if (outcome === 'accepted') {
                   console.log('User accepted PWA installation');
               }
               deferredPrompt = null;
               document.getElementById('pwa-install-btn').classList.add('hidden');
           }
       });

       // --- CONNECTION BADGE STATUS ---
       function updateConnectionBadge(online) {
           isOnline = online;
           const badge = document.getElementById('conn-badge');
           const dot = document.getElementById('conn-dot');
           const text = document.getElementById('conn-text');
           if (!badge) return;

           if (online) {

       // --- UNIFIED REST API CONNECTOR ---
       function executeAPI(action, payload, successHandler) {
           startLoading();
           
           if (typeof google !== 'undefined' && google.script && google.script.run) {
               google.script.run.withSuccessHandler((res) => {
                   updateConnectionBadge(true);
                   endLoading();
                   successHandler(res);
               }).withFailureHandler((err) => {
                   lastErrorLog = String(err);
                   endLoading();
                   switchToLocalFallback(action, payload, successHandler, "Koneksi Google Script Gagal");
               })[action](payload);
               return;
           }

           if (GAS_URL === "" || GAS_URL.includes("YOUR_GAS_URL")) {
               lastErrorLog = "GAS URL tidak diatur.";
               switchToLocalFallback(action, payload, successHandler, "Backend belum diatur");
               return;
           }

           const controller = new AbortController();
           const timeoutId = setTimeout(() => controller.abort(), 6000);

           fetch(GAS_URL, {
               method: "POST",
               mode: "cors",
               headers: { "Content-Type": "text/plain" },
               body: JSON.stringify({ action: action, payload: payload }),
               signal: controller.signal
           })
           .then(res => {
               clearTimeout(timeoutId);
               if (!res.ok) throw new Error("CORS / HTTP Status Error: " + res.status);
               return res.json();
           })
           .then(res => {
               updateConnectionBadge(true);
               endLoading();
               successHandler(res);
           })
           .catch(err => {
               clearTimeout(timeoutId);
               endLoading();
               lastErrorLog = err.name === 'AbortError' ? 'Timeout 6 Detik. Server sedang Cold-Start.' : String(err);
               switchToLocalFallback(action, payload, successHandler, err.name === 'AbortError' ? 'Koneksi Timeout (6 Detik)' : 'Backend Offline / Masalah CORS');
           });
       }

       function switchToLocalFallback(action, payload, successHandler, reason) {
           updateConnectionBadge(false);
           if (action === "getAllData" || action === "loginUser") {
               Swal.fire({
                   icon: 'warning',
                   title: 'Gagal Terhubung Cloud',
                   text: `Sistem otomatis beralih ke Mode Simulator Lokal (${reason}).`,
                   toast: true,
                   position: 'top-end',
                   showConfirmButton: false,
                   timer: 3500
               });
           }
           simulateLocalDatabase(action, payload, successHandler);
       }

       // --- LOCAL SIMULATION DATA LOGIC ---
       function simulateLocalDatabase(action, payload, successHandler) {
           loadOfflineDatabase();
           
           if (action === "getAllData") {
               successHandler(db);
           } else if (action === "loginUser") {
               if ((payload.username === 'admin' && payload.password === 'sarjanasoft') || (payload.username === 'admin' && payload.password === 'AdminGuru2025!')) {
                   successHandler({ success: true, user: { username: "admin", nama: "Administrator Pro (Demo Offline)", role: "Admin" } });
               } else {
                   successHandler({ success: false, message: 'Kredensial simulasi salah! Gunakan password: sarjanasoft' });
               }
           } else if (action === "getData" && payload === "Settings") {
               successHandler(db.Settings);
           } else if (action === "saveSettings") {
               for (let key in payload) {
                   let found = db.Settings.find(s => s.key === key);
                   if (found) found.value = payload[key];
                   else db.Settings.push({ key: key, value: payload[key] });
               }
               saveOfflineDatabase();
               successHandler({ success: true });
           } else if (action === "saveData") {
               const sheet = payload.sheetName;
               const item = payload.obj;
               if (!item.id) item.id = "ID-" + new Date().getTime();
               db[sheet].unshift(item);
               saveOfflineDatabase();
               successHandler({ success: true });
           } else if (action === "saveBulkAbsen") {
               payload.forEach(a => {
                   if (!a.id) a.id = "ABS-" + new Date().getTime() + "-" + Math.floor(Math.random() * 100);
                   db.Absen.unshift(a);
               });
               saveOfflineDatabase();
               successHandler({ success: true });
           } else if (action === "saveBulkNilai") {
               payload.forEach(n => {
                   n.id = "NIL-" + new Date().getTime() + "-" + Math.floor(Math.random() * 1000);
                   n.tanggal = new Date().toISOString().split('T')[0];
                   db.Nilai.unshift(n);
               });
               saveOfflineDatabase();
               successHandler({ success: true });
           } else {
               successHandler({ success: true });
           }
       }

       function submitAbsen() {
           const cls = document.getElementById('abs-kelas').value;
           const date = document.getElementById('abs-tanggal').value;
           const students = db.Siswa.filter(s => s.kelas === cls);
           const bulanAngka = Number(date.substring(5, 7)).toString();
           const data = students.map(s => ({ tanggal: date, bulan: bulanAngka, siswa_id: s.id, nama_siswa: s.nama, kelas: cls, status: document.querySelector(`input[name="st-${s.id}"]:checked`).value }));
           
           executeAPI('saveBulkAbsen', data, () => {
               Swal.fire({ icon: 'success', title: 'Data Absensi Disimpan!', showConfirmButton: false, timer: 1500 });
               switchTab('absen', 'rekap');
           });
       }

       function renderAbsenRekap() {
           const area = document.getElementById('abs-rekap-area');
           if(!area) return;
           const blnSelect = document.getElementById('rek-bulan');
           const clsSelect = document.getElementById('rek-absen-kelas');
           const bln = blnSelect ? blnSelect.value : "";
           const cls = clsSelect ? clsSelect.value : "";
           if(!bln) { area.innerHTML = '<p class="text-center py-6 text-slate-300 font-bold uppercase italic text-xs">Pilih periode laporan</p>'; return; }
           let filtered = db.Absen;
           if (bln === 'genap') filtered = filtered.filter(a => [1,2,3,4,5,6].includes(Number(a.bulan)));
           else if (bln === 'ganjil') filtered = filtered.filter(a => [7,8,9,10,11,12].includes(Number(a.bulan)));
           else filtered = filtered.filter(a => String(a.bulan) === String(bln));
           if (cls) filtered = filtered.filter(a => a.kelas === cls);
           if(filtered.length === 0) { area.innerHTML = `<p class="text-center py-10 text-slate-300 font-bold italic uppercase text-xs">Data Tidak Ditemukan</p>`; return; }
           
           const summary = {};
           filtered.forEach(a => {
               if (!summary[a.siswa_id]) summary[a.siswa_id] = { name: a.nama_siswa, kelas: a.kelas, H: 0, I: 0, S: 0, A: 0, total: 0 };
               summary[a.siswa_id][a.status]++; summary[a.siswa_id].total++;
           });
           
           area.innerHTML = `<div class="overflow-x-auto"><table class="w-full text-xs text-left border-collapse"><thead class="bg-slate-50 text-[9px] font-black uppercase text-slate-400"><tr><th class="p-3">Nama Murid</th><th class="p-3 text-center">Hari</th><th class="p-3 text-center text-blue-600">H</th><th class="p-3 text-center text-amber-500">S</th><th class="p-3 text-center text-emerald-500">I</th><th class="p-3 text-center text-rose-500">A</th><th class="p-3 text-center font-black">Persen</th></tr></thead><tbody class="divide-y">${Object.values(summary).map(s => `<tr><td class="p-3 font-black text-slate-700">${s.name} <br><span class="text-[8px] text-slate-400 font-bold uppercase">${s.kelas}</span></td><td class="p-3 text-center font-bold text-slate-400">${s.total}</td><td class="p-3 text-center font-bold text-blue-600">${s.H}</td><td class="p-3 text-center font-bold text-amber-500">${s.S}</td><td class="p-3 text-center font-bold text-emerald-500">${s.I}</td><td class="p-3 text-center font-bold text-rose-500">${s.A}</td><td class="p-3 text-center font-black">${Math.round((s.H/s.total)*100)}%</td></tr>`).join('')}</tbody></table></div>`;
       }

       function renderNilaiRekap() {
           const area = document.getElementById('nilai-rekap-area');
           if(!area) return;
           const cls = document.getElementById('rek-nilai-kelas')?.value || "";
           const mapel = document.getElementById('rek-nilai-mapel')?.value || "";
           if(!cls) { area.innerHTML = '<p class="text-center py-10 font-bold uppercase text-slate-300 italic text-xs">Pilih kelas rekap nilai</p>'; return; }
           if(!db.Nilai || db.Nilai.length === 0) { area.innerHTML = '<p class="text-center py-10 font-bold uppercase text-slate-300 italic text-xs">Belum ada data nilai</p>'; return; }
          
           const summary = {};
           let list = db.Nilai.filter(n => n.kelas === cls);
           if (mapel) list = list.filter(n => n.mapel === mapel);
           list.forEach(n => {
               const key = `${n.siswa_id}|${n.mapel}`;
               if (!summary[key]) {
                   summary[key] = {
                       nama: n.nama_siswa, kelas: n.kelas, mapel: n.mapel,
                       PR: [], Harian: [], Tugas: [], Projek: [], Portofolio: [], Sumatif: [], STS: [], SAS: []
                   };
               }
               if (summary[key][n.jenis_nilai]) summary[key][n.jenis_nilai].push(Number(n.skor));
           });
           const getAvg = (arr) => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0;
           area.innerHTML = `
           <div class="overflow-x-auto"><table class="w-full text-left text-[9px] border-collapse"><thead class="bg-slate-50 text-slate-400 font-black uppercase"><tr><th class="p-2">Siswa</th><th class="p-2">Mapel</th><th class="p-2 text-center">PR</th><th class="p-2 text-center">HR</th><th class="p-2 text-center">TG</th><th class="p-2 text-center">PJ</th><th class="p-2 text-center">PF</th><th class="p-2 text-center">SU</th><th class="p-2 text-center">ST</th><th class="p-2 text-center">SA</th><th class="p-2 text-center text-blue-600 font-black">AVG</th></tr></thead><tbody class="divide-y">${Object.values(summary).map(s => {
               const averages = [getAvg(s.PR), getAvg(s.Harian), getAvg(s.Tugas), getAvg(s.Projek), getAvg(s.Portofolio), getAvg(s.Sumatif), getAvg(s.STS), getAvg(s.SAS)];
               const finalActive = averages.filter(v => v > 0);
               const finalAvg = finalActive.length ? Math.round(finalActive.reduce((a,b)=>a+b,0)/finalActive.length) : 0;
               return `<tr><td class="p-2 font-black text-slate-800 text-left">${s.nama} <br><span class="text-[7px] font-bold text-slate-300 uppercase">${s.kelas}</span></td><td class="p-2 font-bold uppercase text-slate-400 tracking-tighter">${s.mapel}</td><td class="p-2 text-center">${getAvg(s.PR)}</td><td class="p-2 text-center">${getAvg(s.Harian)}</td><td class="p-2 text-center">${getAvg(s.Tugas)}</td><td class="p-2 text-center">${getAvg(s.Projek)}</td><td class="p-2 text-center">${getAvg(s.Portofolio)}</td><td class="p-2 text-center">${getAvg(s.Sumatif)}</td><td class="p-2 text-center">${getAvg(s.STS)}</td><td class="p-2 text-center">${getAvg(s.SAS)}</td><td class="p-2 text-center font-black text-blue-600 bg-slate-50">${finalAvg}</td></tr>`;
           }).join('')}</tbody></table></div>`;
       }

                   <div class="mt-2 grid grid-cols-1 gap-2 text-[11px] font-bold text-slate-500">
                       <div><p class="text-[8px] uppercase text-slate-300 font-black mb-1">Masalah</p><p class="bg-slate-50 p-2.5 rounded-xl">${b.hasil}</p></div>
                       <div><p class="text-[8px] uppercase text-slate-300 font-black mb-1">Tindak Lanjut</p><p class="bg-slate-50 p-2.5 rounded-xl">${b.tindak_lanjut}</p></div>
                   </div>
               </div>`).join('');
       }

       function updateAppSettings() {
           const settingsObj = { nama_sekolah: document.getElementById('set-sekolah').value, alamat: document.getElementById('set-alamat').value, logo_url: document.getElementById('set-logo').value, nama_guru: document.getElementById('set-guru').value, nip_guru: document.getElementById('set-nip-guru').value, nama_kepsek: document.getElementById('set-kepsek').value, nip_kepsek: document.getElementById('set-nip-kepsek').value };
           
           executeAPI('saveSettings', settingsObj, () => {
               Swal.fire('Berhasil', 'Pengaturan sistem disimpan!', 'success');
               switchTab('dashboard');
           });
       }

       function addKelasForm() { 
           Swal.fire({ 
               title: 'Kelas Baru', 
               input: 'text', 
               inputPlaceholder: 'Contoh: XII-TKJ-1',
               confirmButtonText: 'Simpan', 
               customClass: { confirmButton: 'bg-blue-600 p-3 rounded-xl font-bold text-xs px-6' } 
           }).then(r => { 
               if(r.isConfirmed && r.value) {
                   handleSave('Kelas', {nama_kelas: r.value.toUpperCase()});
               } 
           }); 
       }
      
       function addSiswaForm() {
           Swal.fire({
               title: 'Profil Siswa Baru',
               html: `<div class="text-left space-y-3 p-1">
                   <div><label class="text-[9px] font-black uppercase text-slate-400 ml-1 tracking-wider block">NIS</label><input id="sw-nis" class="form-input-premium mt-1 text-sm" placeholder="Masukkan NIS..."></div>
                   <div><label class="text-[9px] font-black uppercase text-slate-400 ml-1 tracking-wider block">Nama Lengkap</label><input id="sw-nama" class="form-input-premium mt-1 text-sm" placeholder="Nama Lengkap..."></div>
                   <div class="grid grid-cols-2 gap-3">
                       <div><label class="text-[9px] font-black uppercase text-slate-400 ml-1 block">Jenis Kelamin</label><select id="sw-jk" class="form-input-premium mt-1 text-sm"><option value="L">Laki-laki</option><option value="P">Perempuan</option></select></div>
                       <div><label class="text-[9px] font-black uppercase text-slate-400 ml-1 block">Kelas</label><select id="sw-kelas" class="form-input-premium mt-1 text-sm">${db.Kelas.map(k => `<option value="${k.nama_kelas}">${k.nama_kelas}</option>`).join('')}</select></div>
                   </div>
                   <div class="pt-1"><label class="flex items-center gap-2.5 p-3.5 bg-blue-50 border border-blue-100 rounded-2xl cursor-pointer"><input type="checkbox" id="sw-wali" class="w-5 h-5 accent-blue-600"><span class="text-xs font-black text-blue-700">Siswa Bimbingan Wali</span></label></div>
               </div>`,
               confirmButtonText: 'Simpan Profil',
               customClass: { confirmButton: 'bg-blue-600 p-3 rounded-xl font-black text-xs px-8 shadow-md' },
               preConfirm: () => {
                   const valNis = document.getElementById('sw-nis').value; const valNama = document.getElementById('sw-nama').value;
                   if(!valNis || !valNama) return Swal.showValidationMessage("NIS dan Nama harus diisi!");
                   return { nis: valNis, nama: valNama, jk: document.getElementById('sw-jk').value, kelas: document.getElementById('sw-kelas').value, is_bimbingan: document.getElementById('sw-wali').checked ? "Ya" : "Tidak" };
               }
           }).then(r => { if(r.isConfirmed) handleSave('Siswa', r.value); });
       }

       function addJadwalForm() {
           Swal.fire({
               title: 'Input Jadwal Baru',
               html: `<div class="text-left space-y-3 p-1">
                   <select id="sw-jad-hari" class="form-input-premium"><option value="Senin">Senin</option><option value="Selasa">Selasa</option><option value="Rabu">Rabu</option><option value="Kamis">Kamis</option><option value="Jumat">Jumat</option><option value="Sabtu">Sabtu</option></select>
                   <input id="sw-jad-jam" class="form-input-premium" placeholder="Jam (Contoh: 07:30 - 09:00)">
                   <select id="sw-jad-kls" class="form-input-premium">${db.Kelas.map(k => `<option value="${k.nama_kelas}">${k.nama_kelas}</option>`).join('')}</select>
                   <input id="sw-jad-mp" class="form-input-premium" placeholder="Nama Mata Pelajaran">
               </div>`,
               preConfirm: () => ({ hari: document.getElementById('sw-jad-hari').value, jam: document.getElementById('sw-jad-jam').value, kelas: document.getElementById('sw-jad-kls').value, mapel: document.getElementById('sw-jad-mp').value })
           }).then(r => { if(r.isConfirmed) handleSave('Jadwal', r.value); });
       }

       function handleSave(sheet, obj) {
           executeAPI('saveData', { sheetName: sheet, obj: obj }, () => {
               Swal.fire('Berhasil', 'Data berhasil tersimpan!', 'success');
               switchTab(sheet.toLowerCase());
           });
       }
       
       // --- MASTER PRINT LAYOUT ENGINE ---
       function generateMasterPrint(title, tableHtml) {
           const logo = getSettingValue('logo_url') || '';
           const school = getSettingValue('nama_sekolah');
           const address = getSettingValue('alamat');
           const guru = getSettingValue('nama_guru');
           const nipGuru = getSettingValue('nip_guru');
           const kepsek = getSettingValue('nama_kepsek');
           const nipKepsek = getSettingValue('nip_kepsek');
           const win = window.open("", "_blank");
           win.document.write(`<html><head><title>${title}</title><style>body{font-family:sans-serif;padding:30px;color:#333;line-height:1.4}.header{display:flex;align-items:center;border-bottom:3px solid #000;padding-bottom:15px;margin-bottom:20px}.logo{width:70px;height:70px;margin-right:20px;object-fit:contain}.title-area{flex:1}.school-name{font-size:20px;font-weight:900;margin:0;text-transform:uppercase}.school-addr{font-size:11px;margin:0;font-weight:600}h1{text-align:center;font-size:15px;text-transform:uppercase;margin:20px 0}table{width:100%;border-collapse:collapse;margin-top:10px}th,td{border:1px solid #000;padding:8px;font-size:10px;text-align:left}th{background:#f0f0f0;text-transform:uppercase}.footer{margin-top:50px;display:flex;justify-content:space-between;font-size:11px}.sign-box{text-align:center;width:200px}.sign-space{height:70px}</style></head><body><div class="header">${logo ? `<img src="${logo}" class="logo">` : ''}<div class="title-area"><h2 class="school-name">${school}</h2><p class="school-addr">${address}</p></div></div><h1>${title}</h1>${tableHtml}<div class="footer"><div class="sign-box">Mengetahui,<br>Kepala Sekolah<br><div class="sign-space"></div><strong>${kepsek}</strong><br>NIP: ${nipKepsek}</div><div class="sign-box">Dicetak pada ${new Date().toLocaleDateString('id-ID')},<br>Guru Wali / Pengampu<br><div class="sign-space"></div><strong>${guru}</strong><br>NIP: ${nipGuru}</div></div><script>window.print();<\/script></body></html>`);
           win.document.close();
       }

       function printRekapAbsen() { const html = document.getElementById('abs-rekap-area').innerHTML; if(html.includes('Pilih periode')) return Swal.fire('Info', 'Pilih periode!'); generateMasterPrint('REKAPITULASI ABSENSI SISWA', html); }
       function printRekapNilai() { const html = document.getElementById('nilai-rekap-area').innerHTML; if(!html || html.includes('Pilih kelas')) return Swal.fire('Info', 'Pilih kelas dan mata pelajaran!'); generateMasterPrint('REKAPITULASI NILAI AKADEMIK SISWA', html); }
       function printRekapJurnal() { const cls = document.getElementById('rek-jurnal-kelas')?.value || "SEMUA KELAS"; let list = db.Jurnal; if (cls !== "") list = list.filter(j => j.kelas === cls); let table = `<table><thead><tr><th>TGL</th><th>KLS</th><th>MATERI</th><th>KEGIATAN</th></tr></thead><tbody>${list.map(j => `<tr><td>${j.tanggal}</td><td>${j.kelas}</td><td>${j.materi}</td><td>${j.kegiatan}</td></tr>`).join('')}</tbody></table>`; generateMasterPrint('JURNAL MENGAJAR - ' + (cls||"SEMUA KELAS"), table); }
       function printRekapBimbingan() { const cls = document.getElementById('rek-bimbingan-kelas')?.value || "SEMUA KELAS"; let list = db.Bimbingan; if (cls !== "") { const sIds = db.Siswa.filter(s => s.kelas === cls).map(s => String(s.id)); list = list.filter(b => sIds.includes(String(b.siswa_id))); } let table = `<table><thead><tr><th>TGL</th><th>NAMA SISWA</th><th>KATEGORI</th><th>HASIL</th></tr></thead><tbody>${list.map(b => `<tr><td>${b.tanggal}</td><td>${b.nama_siswa}</td><td>${b.jenis}</td><td>${b.hasil}</td></tr>`).join('')}</tbody></table>`; generateMasterPrint('BIMBINGAN WALI KELAS - ' + (cls||"SEMUA KELAS"), table); }
       
       // UI LOADING GRAPHICS
       function startLoading() { document.getElementById('loader-bar').style.display = 'block'; }
       function endLoading() { document.getElementById('loader-bar').style.display = 'none'; }
   </script>
</body>
</html>
